name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Guard release version (monotonic + matches VERSION)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="$(tr -d "[:space:]" < VERSION)"
          if [ "v$VER" != "$TAG" ]; then
            echo "::error::VERSION file ($VER) does not match pushed tag ($TAG)"
            exit 1
          fi
          PREV="$(git tag --list "v*" --sort=-v:refname | grep -vx "$TAG" | head -1 || true)"
          if [ -n "$PREV" ]; then
            TOP="$(printf "%s\\n%s\\n" "${TAG#v}" "${PREV#v}" | sort -V | tail -1)"
            if [ "$TOP" != "${TAG#v}" ]; then
              echo "::error::refusing backwards release: $TAG is not greater than existing latest $PREV"
              exit 1
            fi
          fi
          echo "release guard OK: $TAG > ${PREV:-<none>}"

      - name: Build and test
        run: make all

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
